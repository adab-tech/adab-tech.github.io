<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hausa Language Explorer — lessons, dictionary, quizzes, and culture. Works offline.">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Hausa Language Explorer</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/hausa-explorer.css">
</head>
<body>
  <div class="hx-shell">
    <header class="hx-header">
      <div class="hx-header-inner">
        <a class="hx-brand" href="https://adamu.tech/#projects">
          <span class="hx-brand-mark">HE</span>
          <span>
            <h1>Hausa Explorer</h1>
            <p>Learn · Practice · Remember</p>
          </span>
        </a>
        <nav class="hx-nav" aria-label="Main">
          <button type="button" data-nav="home" class="active">Home</button>
          <button type="button" data-nav="lessons">Lessons</button>
          <button type="button" data-nav="dictionary">Dictionary</button>
          <button type="button" data-nav="culture">Culture</button>
          <button type="button" data-nav="quiz">Quiz</button>
          <button type="button" data-nav="practice">Practice</button>
          <button type="button" class="hx-btn ghost" id="hx-theme-toggle" aria-label="Toggle theme">Theme</button>
        </nav>
      </div>
    </header>

    <main class="hx-main" id="hx-app" aria-live="polite"></main>

    <nav class="hx-bottom-nav" aria-label="Mobile">
      <button type="button" data-nav="home" class="active">Home</button>
      <button type="button" data-nav="lessons">Lessons</button>
      <button type="button" data-nav="dictionary">Dict</button>
      <button type="button" data-nav="quiz">Quiz</button>
      <button type="button" data-nav="culture">Culture</button>
    </nav>

    <footer class="hx-footer">
      <p>© 2026 Hausa Language Explorer · <a href="https://adamu.tech/">adamu.tech</a></p>
    </footer>
  </div>

  <script src="js/hausa-explorer-data.js"></script>
  <script src="js/hausa-lessons.js"></script>
  <script src="js/robinson-lookup.js"></script>
  <script src="js/hausa-explorer-app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function () {});
    }
  </script>
</body>
</html>
