name: CI

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  build-and-a11y:
    name: Build & A11y checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=low || true

      - name: Serve site
        run: python3 -m http.server 8000 & sleep 2
        shell: bash

      - name: Run pa11y
        run: npx pa11y http://127.0.0.1:8000 --reporter json > pa11y.json || true
        shell: bash

      - name: Upload pa11y report
        uses: actions/upload-artifact@v4
        with:
          name: pa11y-report
          path: pa11y.json

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run axe audit (Playwright)
        run: npm run axe-audit || true

      - name: Upload axe results (if any)
        uses: actions/upload-artifact@v4
        with:
          name: axe-results
          path: |
            axe-results.json

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-and-a11y
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install
        run: npm ci

      - name: Build (if applicable)
        run: npm run build || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
