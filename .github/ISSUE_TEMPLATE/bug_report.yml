name: Bug report
description: Report something broken or unexpected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve this project. Include steps to reproduce when possible.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to ...\n2. Click ...\n3. See error"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "e.g. Windows 11, Chrome 124, Node 20"
    validations:
      required: false
